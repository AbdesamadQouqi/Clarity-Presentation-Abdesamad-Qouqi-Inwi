<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clarity</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #fafafa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1d1d1f;
            position: relative;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            padding: 2rem;
            text-align: center;
        }

        /* Conteneur vidéo épuré */
        .video-wrapper {
            border: solid 2px #8c82ac4b;
            background: none;
            border-radius: 20px;
            overflow: hidden;
            margin: 0 auto;
            position: relative;
        }

        /* Style minimaliste de la vidéo avec transition de flou */
        video {
            width: 100%;
            height: auto;
            display: block;
            background: none;
            transition: filter 0.5s ease;
            cursor: pointer;
        }

        /* Effet de flou */
        video.blurred {
            filter: blur(8px);
        }

        /* Overlay pour le bouton reprendre */
        .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(2px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.5s ease;
            z-index: 10;
            cursor: pointer;
        }

        .video-overlay.visible {
            opacity: 1;
            visibility: visible;
        }

        /* Bouton reprendre central */
        .resume-btn {
            background: none;
            border: none;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.9);
            font-size: 1.8rem;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .resume-btn:hover {
            transform: scale(1.1);
        }

        /* Barre de contrôle ultra-minimaliste - SANS BOUTON PLAY */
        .custom-controls {
            display: flex;
            align-items: center;
            gap: 2px;
            padding: 16px 20px;
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(10px);
            border-top: 2px solid #8c82ac4b;
        }

        /* Barre de progression ultra-mince */
        .progress-container {
            flex: 1;
            height: 5px;
            background: rgba(0,0,0,0.08);
            border-radius: 1px;
            cursor: pointer;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            background: #8c82ac;
            border-radius: 20px;
            width: 0%;
            transition: width 0.1s linear;
        }

        /* Timestamp au survol */
        .hover-time {
            position: absolute;
            bottom: 20px;
            background: rgba(0,0,0,0.8);
            color: white;
            font-size: 0.8rem;
            padding: 4px 10px;
            border-radius: 20px;
            transform: translateX(-50%);
            white-space: nowrap;
            pointer-events: none;
            z-index: 150;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.1);
            font-weight: 500;
            letter-spacing: 0.3px;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .progress-container:hover .hover-time {
            opacity: 1;
        }

        /* Indicateur de position sur la barre */
        .hover-indicator {
            position: absolute;
            top: -3px;
            width: 2px;
            height: 11px;
            background: #8c82ac;
            border-radius: 1px;
            opacity: 0;
            transition: opacity 0.1s ease;
            pointer-events: none;
        }

        .progress-container:hover .hover-indicator {
            opacity: 1;
        }

        .time-display {
            font-size: 0.85rem;
            color: #666;
            font-weight: 400;
            letter-spacing: 0.3px;
            min-width: 90px;
            text-align: right;
        }

        /* HEADER EN BAS À DROITE */
        .page-header {
            position: fixed;
            bottom: 5px;
            right: 15px;
            display: flex;
            align-items: center;
            gap: 3px;
            z-index: 100;
        }

        .header-logo {
            width:48px;
            height: 48px;
            opacity: 0.7;
            transition: opacity 0.3s ease;
        }

        .header-logo:hover {
            opacity: 1;
        }

        .header-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .header-text {
            font-size: 0.8rem;
            font-weight: 300;
            color: #717177;
            letter-spacing: -0.02em;
            opacity: 0.8;
            margin: 0;
        }

        h1 {
            display: none;
        }

        /* ===== RESPONSIVE POUR TÉLÉPHONE ===== */
        @media (max-width: 600px) {
            .container {
                padding: 0.5rem;
                height: 100vh;
                display: flex;
                align-items: center;
            }
            
            .video-wrapper {
                border-radius: 12px;
                border-width: 1.5px;
            }
            
            .custom-controls {
                padding: 12px 12px;
                gap: 8px;
            }
            
            .time-display {
                font-size: 0.7rem;
                min-width: 70px;
            }
            
            .progress-container {
                height: 4px;
            }
            
            .hover-time {
                font-size: 0.65rem;
                padding: 2px 8px;
                bottom: 18px;
            }
            
            .resume-btn {
                width: 50px;
                height: 50px;
                font-size: 1.3rem;
            }
            
            .page-header {
                bottom: 15px;
                right: 15px;
            }
            
            .header-logo {
                width: 36px;
                height: 36px;
            }
            
            .header-text {
                font-size: 0.7rem;
            }
        }

        /* Pour les très petits téléphones */
        @media (max-width: 380px) {
            .time-display {
                font-size: 0.6rem;
                min-width: 60px;
            }
            
            .custom-controls {
                padding: 10px 8px;
            }
            
            .resume-btn {
                width: 40px;
                height: 40px;
                font-size: 1.1rem;
            }
            
            .header-logo {
                width: 30px;
                height: 30px;
            }
            
            .header-text {
                font-size: 0.6rem;
            }
        }

        ::selection {
            background-color: rgba(222, 207, 227, 0.632);
            color: #333;
        }

        ::-moz-selection {
            background-color: rgba(106, 83, 122, 0.2);
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="video-wrapper">
            <!-- Overlay avec bouton reprendre -->
            <div class="video-overlay" id="videoOverlay">
                <button class="resume-btn" id="resumeBtn">
                    <i class="fas fa-play"></i>
                </button>
            </div>

            <!-- Vidéo -->
            <video id="videoPlayer">
                <source src="vid_new_1_clients.mov" type="video/mp4">
                Votre navigateur ne supporte pas la vidéo.
            </video>
            
            <!-- Contrôles minimalistes - SANS BOUTON PLAY -->
            <div class="custom-controls">
                <div class="progress-container" id="progressContainer">
                    <div class="progress-bar" id="progressBar"></div>
                    <div class="hover-indicator" id="hoverIndicator"></div>
                    <div class="hover-time" id="hoverTime">0:00</div>
                </div>
                
                <div class="time-display" id="timeDisplay">0:00 / 0:00</div>
            </div>
        </div>
    </div>

    <!-- Header en bas à droite avec logo -->
    <div class="page-header">
        <span class="header-text">Designed by</span>
        <div class="header-logo">
            <img src="AQ_sign_ext_0.png" alt="Logo">
        </div>
    </div>

    <!-- Font Awesome pour les icônes -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <script>
        const video = document.getElementById('videoPlayer');
        const progressContainer = document.getElementById('progressContainer');
        const progressBar = document.getElementById('progressBar');
        const timeDisplay = document.getElementById('timeDisplay');
        const hoverIndicator = document.getElementById('hoverIndicator');
        const hoverTime = document.getElementById('hoverTime');
        const videoOverlay = document.getElementById('videoOverlay');
        const resumeBtn = document.getElementById('resumeBtn');

        // Mettre à jour l'effet de flou et l'overlay
        function updatePlayState() {
            if (video.paused) {
                video.classList.add('blurred');
                videoOverlay.classList.add('visible');
            } else {
                video.classList.remove('blurred');
                videoOverlay.classList.remove('visible');
            }
        }

        // Formater le temps (secondes → MM:SS)
        function formatTime(seconds) {
            if (isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        // Mettre à jour la barre de progression et l'affichage du temps
        function updateProgress() {
            if (!isNaN(video.duration)) {
                const percent = (video.currentTime / video.duration) * 100;
                progressBar.style.width = percent + '%';
                timeDisplay.textContent = `${formatTime(video.currentTime)} / ${formatTime(video.duration)}`;
            }
        }

        // Gérer le mouvement de la souris sur la barre de progression
        progressContainer.addEventListener('mousemove', (e) => {
            const rect = progressContainer.getBoundingClientRect();
            
            // Position relative (0 à 1)
            let x = e.clientX - rect.left;
            x = Math.max(0, Math.min(x, rect.width));
            const percent = x / rect.width;
            
            // Calculer le temps correspondant
            const hoverTimeValue = percent * video.duration;
            
            // Mettre à jour l'indicateur de position
            hoverIndicator.style.left = x + 'px';
            
            // Mettre à jour le texte du timestamp
            hoverTime.textContent = formatTime(hoverTimeValue);
            
            // Positionner le timestamp centré sur la souris
            hoverTime.style.left = x + 'px';
        });

        // Reprendre via le bouton central
        resumeBtn.addEventListener('click', () => {
            video.play();
            updatePlayState();
        });

        // Clic sur l'overlay pour reprendre aussi
        videoOverlay.addEventListener('click', () => {
            video.play();
            updatePlayState();
        });

        // Pause/play en cliquant sur la vidéo
        video.addEventListener('click', () => {
            if (video.paused) {
                video.play();
            } else {
                video.pause();
            }
            updatePlayState();
        });

        // Clic sur la barre de progression
        progressContainer.addEventListener('click', (e) => {
            const rect = progressContainer.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const width = rect.width;
            const seekTime = (clickX / width) * video.duration;
            
            if (!isNaN(seekTime)) {
                video.currentTime = seekTime;
                updateProgress();
            }
        });

        // Mise à jour pendant la lecture
        video.addEventListener('timeupdate', updateProgress);

        // Quand la vidéo est prête
        video.addEventListener('loadedmetadata', () => {
            timeDisplay.textContent = `0:00 / ${formatTime(video.duration)}`;
        });

        // Mettre à jour l'état quand la vidéo se termine
        video.addEventListener('ended', () => {
            updatePlayState();
        });

        // Initialisation
        updatePlayState();
    </script>
</body>
</html>
